<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Candlestick chart with volume pane below</title>
<desc>Shows how volume is displayed as a separate bar chart below the candlestick price chart</desc>
<style>
.t { font-family: sans-serif; font-size: 14px; fill: #2C2C2A; }
.ts { font-family: sans-serif; font-size: 12px; fill: #5F5E5A; }
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>

<!-- PRICE PANE -->
<text class="th" x="40" y="30">Price</text>
<text class="ts" x="40" y="48">Candlesticks show open, high, low, close</text>
<rect x="40" y="60" width="600" height="220" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>

<line x1="100" y1="180" x2="100" y2="250" stroke="#3B6D11" stroke-width="1"/>
<rect x="92" y="195" width="16" height="50" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="160" y1="140" x2="160" y2="210" stroke="#3B6D11" stroke-width="1"/>
<rect x="152" y="155" width="16" height="50" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="220" y1="120" x2="220" y2="175" stroke="#3B6D11" stroke-width="1"/>
<rect x="212" y="130" width="16" height="40" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="280" y1="130" x2="280" y2="190" stroke="#A32D2D" stroke-width="1"/>
<rect x="272" y="140" width="16" height="45" fill="#E24B4A" stroke="#A32D2D" stroke-width="0.5"/>
<line x1="340" y1="160" x2="340" y2="240" stroke="#A32D2D" stroke-width="1"/>
<rect x="332" y="170" width="16" height="65" fill="#E24B4A" stroke="#A32D2D" stroke-width="0.5"/>
<line x1="400" y1="200" x2="400" y2="245" stroke="#3B6D11" stroke-width="1"/>
<rect x="392" y="210" width="16" height="30" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="460" y1="170" x2="460" y2="220" stroke="#3B6D11" stroke-width="1"/>
<rect x="452" y="180" width="16" height="35" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="520" y1="100" x2="520" y2="180" stroke="#3B6D11" stroke-width="1"/>
<rect x="512" y="110" width="16" height="65" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
<line x1="580" y1="105" x2="580" y2="150" stroke="#A32D2D" stroke-width="1"/>
<rect x="572" y="115" width="16" height="30" fill="#E24B4A" stroke="#A32D2D" stroke-width="0.5"/>

<!-- VOLUME PANE -->
<text class="th" x="40" y="310">Volume</text>
<text class="ts" x="40" y="328">Each bar = total shares traded that day (color matches its candle)</text>
<rect x="40" y="340" width="600" height="100" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>

<rect x="92" y="400" width="16" height="40" fill="#97C459" opacity="0.7"/>
<rect x="152" y="365" width="16" height="75" fill="#97C459" opacity="0.7"/>
<rect x="212" y="395" width="16" height="45" fill="#97C459" opacity="0.7"/>
<rect x="272" y="410" width="16" height="30" fill="#E24B4A" opacity="0.7"/>
<rect x="332" y="355" width="16" height="85" fill="#E24B4A" opacity="0.7"/>
<rect x="392" y="415" width="16" height="25" fill="#97C459" opacity="0.7"/>
<rect x="452" y="405" width="16" height="35" fill="#97C459" opacity="0.7"/>
<rect x="512" y="350" width="16" height="90" fill="#97C459" opacity="0.7"/>
<rect x="572" y="400" width="16" height="40" fill="#E24B4A" opacity="0.7"/>

<line x1="340" y1="345" x2="340" y2="295" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 2"/>
<line x1="520" y1="345" x2="520" y2="295" stroke="#888780" stroke-width="0.5" stroke-dasharray="2 2"/>
</svg>

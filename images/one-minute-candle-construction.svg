<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img">
<title>How individual trades form a 1-minute candle</title>
<desc>Shows many individual trade ticks within a 60-second window and how they compress into a single candlestick</desc>
<style>
.t { font-family: sans-serif; font-size: 14px; fill: #2C2C2A; }
.ts { font-family: sans-serif; font-size: 12px; fill: #5F5E5A; }
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="40" y="30">Inside a single 1-minute candle (10:23:00 to 10:23:59)</text>
<text class="ts" x="40" y="48">Every dot is one actual trade. The candle on the right summarizes them all.</text>

<rect x="40" y="70" width="440" height="280" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="45" y="65">Price</text>
<text class="ts" x="260" y="368" text-anchor="middle">Time (seconds within the minute)</text>

<line x1="40" y1="100" x2="480" y2="100" stroke="#888780" stroke-width="0.3" stroke-dasharray="2 3"/>
<text class="ts" x="485" y="104">High: 100.85</text>
<line x1="40" y1="330" x2="480" y2="330" stroke="#888780" stroke-width="0.3" stroke-dasharray="2 3"/>
<text class="ts" x="485" y="334">Low: 100.40</text>

<circle cx="55" cy="220" r="4" fill="#185FA5" stroke="#042C53" stroke-width="1"/>
<text class="ts" x="55" y="245" text-anchor="middle" style="font-weight:500">OPEN</text>
<text class="ts" x="55" y="258" text-anchor="middle">100.60</text>

<circle cx="75" cy="210" r="2" fill="#888780"/>
<circle cx="90" cy="195" r="2" fill="#888780"/>
<circle cx="105" cy="180" r="2" fill="#888780"/>
<circle cx="120" cy="165" r="2" fill="#888780"/>
<circle cx="135" cy="150" r="2" fill="#888780"/>
<circle cx="150" cy="140" r="2" fill="#888780"/>
<circle cx="165" cy="120" r="2" fill="#888780"/>
<circle cx="180" cy="100" r="3" fill="#3B6D11" stroke="#173404" stroke-width="1"/>
<text class="ts" x="180" y="88" text-anchor="middle" style="font-weight:500">HIGH hit</text>
<circle cx="195" cy="115" r="2" fill="#888780"/>
<circle cx="210" cy="135" r="2" fill="#888780"/>
<circle cx="225" cy="160" r="2" fill="#888780"/>
<circle cx="240" cy="185" r="2" fill="#888780"/>
<circle cx="255" cy="210" r="2" fill="#888780"/>
<circle cx="270" cy="240" r="2" fill="#888780"/>
<circle cx="285" cy="270" r="2" fill="#888780"/>
<circle cx="300" cy="300" r="2" fill="#888780"/>
<circle cx="315" cy="330" r="3" fill="#A32D2D" stroke="#501313" stroke-width="1"/>
<text class="ts" x="315" y="352" text-anchor="middle" style="font-weight:500">LOW hit</text>
<circle cx="330" cy="310" r="2" fill="#888780"/>
<circle cx="345" cy="285" r="2" fill="#888780"/>
<circle cx="360" cy="260" r="2" fill="#888780"/>
<circle cx="375" cy="240" r="2" fill="#888780"/>
<circle cx="390" cy="220" r="2" fill="#888780"/>
<circle cx="405" cy="200" r="2" fill="#888780"/>
<circle cx="420" cy="185" r="2" fill="#888780"/>
<circle cx="435" cy="175" r="2" fill="#888780"/>
<circle cx="450" cy="168" r="2" fill="#888780"/>
<circle cx="465" cy="160" r="4" fill="#185FA5" stroke="#042C53" stroke-width="1"/>
<text class="ts" x="465" y="145" text-anchor="middle" style="font-weight:500">CLOSE</text>
<text class="ts" x="465" y="133" text-anchor="middle">100.75</text>

<line x1="510" y1="210" x2="555" y2="210" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="532" y="200" text-anchor="middle">becomes</text>

<rect x="575" y="70" width="90" height="280" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="620" y="65" text-anchor="middle">1-min candle</text>

<line x1="620" y1="100" x2="620" y2="160" stroke="#3B6D11" stroke-width="1.2"/>
<rect x="606" y="160" width="28" height="60" fill="#97C459" stroke="#3B6D11" stroke-width="0.8"/>
<line x1="620" y1="220" x2="620" y2="330" stroke="#3B6D11" stroke-width="1.2"/>

<line x1="605" y1="100" x2="577" y2="100" stroke="#888780" stroke-width="0.4" stroke-dasharray="2 2"/>
<text class="ts" x="575" y="104" text-anchor="end">H</text>
<line x1="605" y1="160" x2="577" y2="160" stroke="#888780" stroke-width="0.4" stroke-dasharray="2 2"/>
<text class="ts" x="575" y="164" text-anchor="end">C</text>
<line x1="605" y1="220" x2="577" y2="220" stroke="#888780" stroke-width="0.4" stroke-dasharray="2 2"/>
<text class="ts" x="575" y="224" text-anchor="end">O</text>
<line x1="605" y1="330" x2="577" y2="330" stroke="#888780" stroke-width="0.4" stroke-dasharray="2 2"/>
<text class="ts" x="575" y="334" text-anchor="end">L</text>

<text class="ts" x="340" y="398" text-anchor="middle">~30 individual trades compressed into 4 data points: Open, High, Low, Close</text>
</svg>
